name: Build & Push Docker Images

on:
  push:
    branches: [main]

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    if: contains(toJSON(github.event.commits.*.modified), 'orchestrator/') || contains(toJSON(github.event.commits.*.added), 'orchestrator/')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: orchestrator
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jobsy-orchestrator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jobsy-orchestrator:sha-${{ github.sha }}

  frontend:
    runs-on: ubuntu-latest
    if: contains(toJSON(github.event.commits.*.modified), 'frontend/') || contains(toJSON(github.event.commits.*.added), 'frontend/')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jobsy-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jobsy-frontend:sha-${{ github.sha }}
