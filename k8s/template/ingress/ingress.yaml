apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jobsy-platform-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    nginx.ingress.kubernetes.io/limit-req-status-code: "429"
spec:
  ingressClassName: nginx
  rules:
    # Frontend Dashboard
    - host: ${PLATFORM_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
    
    # Orchestrator API
    - host: api.${PLATFORM_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchestrator-service
                port:
                  number: 80
    
    # Динамические агенты - wildcard роутинг
    # Формат: {agent-name}.${PLATFORM_DOMAIN}
    # Orchestrator будет динамически создавать Service для каждого агента
    # Этот Ingress работает как fallback для всех неопределённых поддоменов
    - host: "*.${PLATFORM_DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-proxy-service
                port:
                  number: 80
