apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - name: orchestrator
        image: ${CONTAINER_REGISTRY}/jobsy-orchestrator:${IMAGE_TAG}
        ports:
          - containerPort: 8000
        env:
          - name: TZ
            value: "Africa/Abidjan"
          - name: DEPLOYMENT_TYPE
            value: "k8s"
          - name: CORS_ORIGIN
            value: "https://${PLATFORM_DOMAIN}"
        envFrom:
          - secretRef:
              name: ${ENV_NAME}-orchestrator-env
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 10"]
        volumeMounts:
          - name: agent-data
            mountPath: /agent_data
      volumes:
        - name: agent-data
          persistentVolumeClaim:
            claimName: agent-data-pvc
      # Service Account для доступа к K8s API
      serviceAccountName: orchestrator-sa
